name: 3. Lang And Zs To Paratranz

on:
  issues:
    types: [opened]

env:
  PARATRANZ_TOKEN: ${{ secrets.PARATRANZ_TOKEN }}
  PARATRANZ_PROJECT_ID: ${{ secrets.PARATRANZ_PROJECT_ID }}

  VALID_LABEL: 自动化:lang+zs→paratranz
  VALID_USER: ${{ github.repository_owner }}

  MODPACK_PATH: .modpack.local.d

jobs:
  check-and-parse-issue:
    if: contains(github.event.issue.labels.*.name, '自动化:lang+zs→paratranz')
    name: Check And Parse Issue
    runs-on: ubuntu-latest
    steps:
      - name: Run Script
        id: check-and-parse-issue
        uses: MuXiu1997/Translation-of-GTNH/.github/actions/run-script@master
        with:
          script: parse-issue.ts
          args: lang-and-zs-to-paratranz
        env:
          GITHUB_ISSUE: ${{ toJSON(github.event.issue) }}
          VALID_LABEL: ${{ env.VALID_LABEL }}
          VALID_USER: ${{ env.VALID_USER }}
    outputs:
      passed: ${{ steps.check-and-parse-issue.outputs.passed }}
      modpack-url: ${{ steps.check-and-parse-issue.outputs.modpack-url }}
      modpack-run-url: ${{ steps.check-and-parse-issue.outputs.modpack-run-url }}
      modpack-artifact-name: ${{ steps.check-and-parse-issue.outputs.modpack-artifact-name }}

  close-issue:
    name: Close Issue
    needs: check-and-parse-issue
    if: ${{ needs.check-and-parse-issue.outputs.passed != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Close Issue
        uses: peter-evans/close-issue@v2.0.0
        with:
          comment: |
            此模板仅由内部人员使用，已自动关闭。

  lang-and-zs-to-paratranz:
    name: Lang And Zs To Paratranz
    needs: check-and-parse-issue
    if: ${{ needs.check-and-parse-issue.outputs.passed == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Setup Compare Repo
        uses: MuXiu1997/Translation-of-GTNH/.github/actions/setup-compare-repo@master

      - name: Setup Bun
        uses: MuXiu1997/Translation-of-GTNH/.github/actions/setup-bun@master

      - name: Ensure Modpack
        uses: MuXiu1997/Translation-of-GTNH/.github/actions/ensure-modpack@master
        with:
          url: ${{ needs.check-and-parse-issue.outputs.modpack-url }}
          run-url: ${{ needs.check-and-parse-issue.outputs.modpack-run-url }}
          artifact-name: ${{ needs.check-and-parse-issue.outputs.modpack-artifact-name }}
          root: ${{ env.MODPACK_PATH }}

      - name: Inspect Modpack Structure
        run: |
          MODPACK_DIR='${{ env.MODPACK_PATH }}'
          echo "============================================================"
          echo "解压后的 modpack 根目录: $MODPACK_DIR"
          echo "============================================================"
          echo
          echo "---------- 总大小 ----------"
          du -sh "$MODPACK_DIR" 2>/dev/null || echo "(无法计算大小)"
          echo
          echo "---------- 顶层目录结构 ----------"
          ls -lah "$MODPACK_DIR"
          echo
          echo "---------- 关键子目录是否存在 ----------"
          for sub in mods scripts config resources resourcepacks coremods lang; do
            if [ -e "$MODPACK_DIR/$sub" ]; then
              count=$(find "$MODPACK_DIR/$sub" -mindepth 1 -maxdepth 1 2>/dev/null | wc -l | tr -d ' ')
              size=$(du -sh "$MODPACK_DIR/$sub" 2>/dev/null | cut -f1)
              echo "  [✓] $sub  (条目: $count, 大小: $size)"
            else
              echo "  [✗] $sub  (不存在)"
            fi
          done
          echo
          echo "---------- mods 目录前 20 个 jar ----------"
          if [ -d "$MODPACK_DIR/mods" ]; then
            find "$MODPACK_DIR/mods" -maxdepth 1 -name "*.jar" -printf "%f\n" 2>/dev/null \
              | sort | head -20
            total_jars=$(find "$MODPACK_DIR/mods" -maxdepth 1 -name "*.jar" 2>/dev/null | wc -l | tr -d ' ')
            echo "  ...(共 $total_jars 个 jar)"
          else
            echo "  (mods 目录不存在)"
          fi
          echo
          echo "---------- scripts 目录前 10 个 zs ----------"
          if [ -d "$MODPACK_DIR/scripts" ]; then
            find "$MODPACK_DIR/scripts" -name "*.zs" 2>/dev/null | head -10
            total_zs=$(find "$MODPACK_DIR/scripts" -name "*.zs" 2>/dev/null | wc -l | tr -d ' ')
            echo "  ...(共 $total_zs 个 zs)"
          else
            echo "  (scripts 目录不存在)"
          fi
          echo
          echo "---------- 是否含 lang 文件 (顶层 5 层内最多 10 条) ----------"
          find "$MODPACK_DIR" -maxdepth 5 -name "*.lang" 2>/dev/null | head -10 || echo "  (未找到 .lang 文件)"

      - name: Run Script
        if: false # TEMP(test): skip ParaTranz sync while testing ensure-modpack
        run: >-
          bun run src/index.ts to-paratranz:lang-zs
          --modpack-path='${{ env.MODPACK_PATH }}'

      - name: Close Issue
        if: false # TEMP(test): skip auto-close while testing ensure-modpack
        uses: peter-evans/close-issue@v2.0.0
        with:
          comment: |
            已自动同步至 Paratranz。
